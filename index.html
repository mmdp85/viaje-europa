<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europa 2026 — Mariano, Sole y Santino</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; }
.hero { height: 280px; position: relative; display: flex; align-items: flex-end; padding: 0 24px 28px; overflow: hidden; }
.hero-img { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=1200&q=80') center/cover; opacity: 0.35; }
.hero-fade { position: absolute; inset: 0; background: linear-gradient(to top, #0a0a0f 0%, transparent 60%); }
.hero-content { position: relative; z-index: 2; width: 100%; }
.hero-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
.hero-title { font-size: 28px; font-weight: 500; letter-spacing: -0.5px; line-height: 1.1; }
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; }
.hero-pills { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: rgba(255,255,255,0.7); }
.pill.gold { background: rgba(212,175,55,0.15); border-color: rgba(212,175,55,0.3); color: #d4af37; }
.wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }
.stats-row { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 1px; background: rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; margin: 24px 0; }
.stat { padding: 16px 8px; text-align: center; background: #0e0e16; }
.stat .n { font-size: 20px; font-weight: 500; color: #d4af37; display: block; }
.stat .l { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.sec { margin: 32px 0 14px; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.route-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
.rdot { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.rdot .dot { width: 10px; height: 10px; border-radius: 50%; }
.rdot .nm { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
.rarr { color: rgba(255,255,255,0.2); font-size: 14px; margin-bottom: 14px; }
.city-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 32px; }
.city-card { border-radius: 14px; overflow: hidden; position: relative; height: 130px; }
.city-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.7; }
.city-card .fade { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%); }
.city-card .ci { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 14px; }
.city-card .ci h3 { font-size: 14px; font-weight: 500; margin: 0; }
.city-card .ci p { font-size: 11px; color: rgba(255,255,255,0.55); margin: 2px 0 0; }
.city-card .cb { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 3px 9px; font-size: 10px; color: #d4af37; }
.tl { position: relative; padding-bottom: 32px; }
.tl::before { content: ''; position: absolute; left: 22px; top: 8px; bottom: 0; width: 1px; background: rgba(255,255,255,0.07); }
.tli { display: flex; gap: 16px; margin-bottom: 10px; }
.tl-ic { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; z-index: 1; }
.ic-v { background: #1a160a; border: 1px solid #d4af3755; }
.ic-t { background: #0a1420; border: 1px solid #378add55; }
.ic-h { background: #120a1a; border: 1px solid #7f77dd55; }
.ic-f { background: #0a1a0f; border: 1px solid #1d9e7555; }
.tl-body { flex: 1; background: #0e0e16; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px 16px; }
.tl-body.mad { border-left: 2px solid #d4af37; border-radius: 0 14px 14px 0; }
.tl-body.bcn { border-left: 2px solid #7f77dd; border-radius: 0 14px 14px 0; }
.tl-body.par { border-left: 2px solid #378add; border-radius: 0 14px 14px 0; }
